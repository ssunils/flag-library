name: Publish to npm

# Publishes the root `react-flaglet` package via npm Trusted Publishing (OIDC).
# No NPM_TOKEN: npm exchanges GitHub's OIDC token for short-lived publish
# credentials, so there is no secret to rotate. Requires a Trusted Publisher
# configured on npm for this repo + workflow, and npm CLI >= 11.5.1.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      # Node 20 ships npm 10; trusted publishing needs >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN here on purpose: npm authenticates via OIDC.
      # access + provenance come from package.json "publishConfig".
      - name: Publish
        run: npm publish
