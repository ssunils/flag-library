<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-flaglet example</title>
    <style>
      body {
        margin: 0;
        background: #fff;
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
        line-height: 1.5;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 4px;
      }
      h2 {
        font-size: 16px;
        color: #444;
        margin: 32px 0 12px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }
      input {
        font-size: 16px;
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      code {
        color: #888;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
        gap: 10px;
      }
    </style>

    <!--
      react-flaglet, React, and ReactDOM are loaded from the esm.sh CDN. No build
      step is required: this single file runs anywhere, including a GitHub Gist
      previewed through https://gistpreview.github.io/ or raw.githack.com.

      `?external=react` tells esm.sh to import React from the import map below
      instead of bundling its own copy, so there is exactly one React instance.
      Pin the react-flaglet version (e.g. react-flaglet@0.1.0) for a stable example.
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "react-flaglet": "https://esm.sh/react-flaglet?external=react",
          "react-flaglet/flags": "https://esm.sh/react-flaglet/flags?external=react"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  </head>
  <body>
    <div id="root">Loading react-flaglet from CDN...</div>

    <script type="text/babel" data-type="module" data-presets="react">
      import { useState } from "react";
      import { createRoot } from "react-dom/client";
      import { Flag, countryCodes, countryNames, resolveCode } from "react-flaglet";
      import { FlagUS, FlagJP, FlagBR } from "react-flaglet/flags";

      function App() {
        const [query, setQuery] = useState("US");
        const resolved = resolveCode(query);
        const sorted = [...countryCodes].sort((a, b) =>
          countryNames[a].localeCompare(countryNames[b]),
        );

        return (
          <main>
            <h1>react-flaglet</h1>
            <p style={{ color: "#666" }}>
              {countryCodes.length} tree-shakeable React country flags. Live
              example running from the esm.sh CDN.
            </p>

            <h2>Dynamic lookup (alpha-2 / alpha-3 / numeric)</h2>
            <div className="row">
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="US, USA, or 840"
              />
              {resolved ? (
                <span className="row">
                  <Flag code={query} size="l" rounded />
                  <strong>{countryNames[resolved]}</strong>
                  <code>({resolved})</code>
                </span>
              ) : (
                <span style={{ color: "#c0392b" }}>No flag for "{query}"</span>
              )}
            </div>

            <h2>Sizes and rounded</h2>
            <div className="row">
              <Flag code="FR" size="s" />
              <Flag code="FR" size="m" />
              <Flag code="FR" size="l" />
              <Flag code="FR" width={64} />
              <Flag code="JP" width={48} rounded />
              <Flag code="JP" width={48} rounded={24} />
            </div>

            <h2>Static imports (tree-shakeable)</h2>
            <div className="row">
              <FlagUS width={48} />
              <FlagJP width={48} />
              <FlagBR width={48} />
            </div>

            <h2>All {countryCodes.length} flags</h2>
            <div className="grid">
              {sorted.map((code) => (
                <span key={code} title={`${countryNames[code]} (${code})`}>
                  <Flag code={code} width={36} rounded={2} />
                </span>
              ))}
            </div>
          </main>
        );
      }

      createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
